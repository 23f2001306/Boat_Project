plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.example.waterhyacinthboat"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.waterhyacinthboat"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"

        def defaultBoatServerUrl = "http://192.168.4.1:5000"
        def configuredBoatServerUrl = project.findProperty("boatServerUrl") ?: defaultBoatServerUrl
        buildConfigField "String", "BOAT_SERVER_URL", "\"${configuredBoatServerUrl}\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}
